# Workflow de Integração Contínua (CI)
# Objetivo: executar os testes unitários a cada push na branch main.
# Estrutura mantida simples e preparada para futuras expansões
# (novos jobs, etapas de qualidade e deploy).

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: tainara-team


jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Obtém o código-fonte do repositório
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # 5. Executa os testes unitários
      - name: Run unit tests
        run: yarn test

  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      # Obter as configurações do vercel
      - name: Pull Vercel Config
        run: yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE

      - name: Build project to Vercel
        run: yarn vercel build --token=$VERCEL_TOKEN

      # 7. Deploy preview no vercel
      - name: Deploy preview
        id: deploy
        run: |
          URL=$(yarn --silent vercel deploy --prebuilt \
          --target=preview \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE)
          echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      # 1. Faz checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      # 2. Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.5.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install

      # 5. Instalação do Chromium
      - name: Install Plawright Browser
        run: yarn playwright install --with-deps chromium

      # 6. Execução dos Testes de Regressão
      - name: Run E2E Regression Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}

      # 7. Relatório de Testes Automatizados
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report

      
          